# Produção: Unificada (Front + Back)
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NODE_ENV=production
    restart: always

# Os serviços de DB e Redis devem ser provisionados separadamente no Easypanel
# ou adicionados aqui com volumes se preferir uma stack completa.
